<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>coding-standards skill — live demo</title>
<style>
  :root {
    --bg: #0d0d0d;
    --bg-elev: #161616;
    --bg-deep: #0a0a0a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #888;
    --text-faint: #555;
    --accent: #d97757;
    --user: #82b1ff;
    --tool: #ffb86c;
    --tool-name: #f1fa8c;
    --result: #50fa7b;
    --error: #ff6b6b;
    --worker-1: #c099ff;
    --worker-2: #5eead4;
    --worker-3: #fda4af;
    --hook: #fbbf24;
    --thinking: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Monaco', 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.55;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-deep);
    flex-shrink: 0;
  }
  header h1 {
    margin: 0;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }
  header .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 12px;
  }
  .scenario-bar {
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--bg-elev);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .scenario-bar label { color: var(--text-dim); font-size: 11px; margin-right: 4px; }
  .scenario-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    transition: all 0.15s;
  }
  .scenario-btn:hover { color: var(--text); border-color: var(--text-faint); }
  .scenario-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 80px;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
  }
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-deep);
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 10px;
    align-items: center;
    z-index: 10;
  }
  .ctrl-btn {
    background: var(--bg-elev);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  .ctrl-btn:hover { border-color: var(--text-faint); }
  .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .speed { color: var(--text-dim); font-size: 11px; margin-left: 12px; }
  .speed select {
    background: var(--bg-elev);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
  }
  .progress { color: var(--text-faint); font-size: 11px; margin-left: auto; }

  /* Message blocks */
  .msg { margin-bottom: 16px; }
  .msg-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-faint);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .msg.user .msg-label { color: var(--user); }
  .msg.user .msg-body {
    color: var(--user);
    background: rgba(130, 177, 255, 0.05);
    border-left: 2px solid var(--user);
    padding: 8px 12px;
    border-radius: 0 4px 4px 0;
  }
  .msg.assistant .msg-body { color: var(--text); padding: 4px 0; white-space: pre-wrap; }
  .msg.assistant .msg-label { color: var(--accent); }

  .msg.thinking .msg-label { color: var(--thinking); }
  .msg.thinking .msg-body {
    color: var(--thinking);
    font-style: italic;
    padding: 4px 0 4px 12px;
    border-left: 2px solid var(--thinking);
    opacity: 0.85;
  }

  /* Tool calls — mimic Claude Code's collapsible look */
  .tool {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin: 8px 0 12px;
    overflow: hidden;
  }
  .tool-header {
    padding: 8px 12px;
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 11px;
  }
  .tool-icon {
    width: 14px; height: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--tool);
  }
  .tool-name { color: var(--tool-name); font-weight: 600; }
  .tool-desc { color: var(--text-dim); font-size: 11px; }
  .tool-body {
    padding: 10px 14px;
    font-size: 12px;
    white-space: pre-wrap;
    color: var(--text);
    max-height: 280px;
    overflow-y: auto;
  }
  .tool-body.result { color: var(--result); }
  .tool-body.error { color: var(--error); }

  /* Worker-specific styling */
  .worker-call .tool-name { color: var(--worker-1); }
  .worker-call[data-worker="2"] .tool-name { color: var(--worker-2); }
  .worker-call[data-worker="3"] .tool-name { color: var(--worker-3); }

  /* Hook events */
  .hook-event {
    background: rgba(251, 191, 36, 0.08);
    border-left: 3px solid var(--hook);
    padding: 8px 12px;
    margin: 8px 0;
    font-size: 12px;
    border-radius: 0 4px 4px 0;
  }
  .hook-event.block { border-left-color: var(--error); background: rgba(255, 107, 107, 0.08); color: var(--error); }
  .hook-event.pass { border-left-color: var(--result); background: rgba(80, 250, 123, 0.08); }
  .hook-event.skip { border-left-color: var(--text-faint); background: rgba(120, 120, 120, 0.08); color: var(--text-dim); }
  .hook-event .hook-label { font-weight: 600; margin-right: 6px; }

  /* Code blocks inside tool bodies */
  .code-block {
    background: var(--bg-deep);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    margin: 6px 0;
    font-size: 11px;
    overflow-x: auto;
    color: #f8f8f2;
  }
  .keyword { color: #ff79c6; }
  .string { color: #f1fa8c; }
  .comment { color: #6272a4; font-style: italic; }
  .fn-name { color: #50fa7b; }
  .prop { color: #8be9fd; }

  /* Cursor */
  .cursor { display: inline-block; }
  .cursor::after {
    content: '▊';
    color: var(--accent);
    animation: blink 1s infinite;
    margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0.3; } }

  /* Separator between major phases */
  .phase-sep {
    margin: 18px 0;
    padding: 6px 0;
    border-top: 1px dashed var(--border);
    color: var(--text-faint);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
</style>
</head>

    { type: 'user', text: 'Quick — write a function that takes a payment and returns the formatted total' },
    { type: 'thinking', text: 'Trivial scope (one function, no use-case). Per Step 1.5, this is inline mode — I do the work myself without dispatching workers. Single-agent fast path.' },

    { type: 'hook', name: 'block-ts-violations.py', status: 'block', text:

  - apps/web/src/checkout/lib/format-payment.ts:1 — \`any\` is banned (type annotation \`: any\`)
  - apps/web/src/checkout/lib/format-payment.ts:1 — NM-006: Hungarian notation \`strAmount\`; drop the \`str\` prefix
  - apps/web/src/checkout/lib/format-payment.ts:1 — NM-006: Hungarian notation \`strCurrency\`; drop the \`str\` prefix
  - apps/web/src/checkout/lib/format-payment.ts:1 — FN-005: \`formatTotal\` takes 4 positional parameters; group into a typed object`,
      error: true,
    },
    { type: 'thinking', text: 'Hook blocked the write — 4 violations: one `any` annotation (the hook reports one per line), Hungarian on `strAmount` and `strCurrency`, and FN-005 (4 positional args). The single-char prefixes `bIncludeSymbol`/`iLocale` are deliberately not flagged. Need to fix these before retrying.' },
    { type: 'assistant', text: 'The hook caught four violations. Fixing all of them — proper types, no Hungarian prefixes, grouped args into a typed object.' },

      type: 'tool', name: 'Write',
      desc: 'apps/web/src/checkout/lib/format-payment.ts',
      body:

// ─────────────────────────────────────────────────────────────────────────────
// Player
// ─────────────────────────────────────────────────────────────────────────────

const terminal = document.getElementById('terminal');
const progressEl = document.getElementById('progress');
const playBtn = document.getElementById('play');
const pauseBtn = document.getElementById('pause');
const restartBtn = document.getElementById('restart');
const skipBtn = document.getElementById('skip');
const speedSelect = document.getElementById('speed');
const scenarioBtns = document.querySelectorAll('.scenario-btn');

let currentScenario = 0;
let currentStep = 0;
let isPlaying = false;
let abortController = null;
let speedMultiplier = 1;

speedSelect.addEventListener('change', () => {
  speedMultiplier = parseFloat(speedSelect.value);
});

function sleep(ms) {
  return new Promise((resolve, reject) => {
    if (abortController?.signal.aborted) return reject(new Error('aborted'));
    const t = setTimeout(resolve, ms / speedMultiplier);
    abortController?.signal.addEventListener('abort', () => {
      clearTimeout(t);
      reject(new Error('aborted'));
    });
  });
}

async function typeText(el, text, charDelay = 8) {
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.appendChild(cursor);
  for (let i = 0; i < text.length; i++) {
    if (abortController?.signal.aborted) throw new Error('aborted');
    cursor.before(document.createTextNode(text[i]));
    // chunk-print for whitespace to feel realistic
    const ch = text[i];
    const d = (ch === '\n' || ch === ' ') ? charDelay / 3 : charDelay;
    await sleep(d);
  }
  cursor.remove();
}

function makeMsg(label, cls) {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg ' + cls;
  const labelEl = document.createElement('div');
  labelEl.className = 'msg-label';
  labelEl.textContent = label;
  const bodyEl = document.createElement('div');
  bodyEl.className = 'msg-body';
  wrapper.append(labelEl, bodyEl);
  terminal.appendChild(wrapper);
  return bodyEl;
}

function makeTool(name, desc, workerNum) {
  const wrapper = document.createElement('div');
  wrapper.className = 'tool' + (workerNum ? ' worker-call' : '');
  if (workerNum) wrapper.dataset.worker = workerNum;
  const header = document.createElement('div');
  header.className = 'tool-header';
  header.innerHTML =
    `<span class="tool-icon">⏵</span><span class="tool-name">${name}</span>` +
    `<span class="tool-desc">${escapeHtml(desc)}</span>`;
  const body = document.createElement('div');
  body.className = 'tool-body';
  wrapper.append(header, body);
  terminal.appendChild(wrapper);
  return body;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function scrollToBottom() {
  terminal.scrollTop = terminal.scrollHeight;
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'auto' });
}

async function playEvent(event) {
  switch (event.type) {
    case 'user': {
      const body = makeMsg('User', 'user');
      await typeText(body, event.text, 12);
      break;
    }
    case 'thinking': {
      const body = makeMsg('Thinking', 'thinking');
      await typeText(body, event.text, 4);
      break;
    }
    case 'assistant': {
      const body = makeMsg('Assistant', 'assistant');
      await typeText(body, event.text, 8);
      break;
    }
    case 'tool': {
      const body = makeTool(event.name, event.desc || '', event.workerNum);
      if (event.error) body.classList.add('error');
      else if (event.result) body.classList.add('result');
      const text = event.body || (event.jsonResult ? JSON.stringify(event.jsonResult, null, 2) : '');
      await typeText(body, text, 2);
      if (event.jsonResult && event.body) {
        // Append the JSON after the body intro
        await sleep(200);
        const jsonBlock = document.createElement('div');
        jsonBlock.className = 'code-block';
        body.appendChild(jsonBlock);
        await typeText(jsonBlock, JSON.stringify(event.jsonResult, null, 2), 1);
      }
      break;
    }
    case 'hook': {
      const wrapper = document.createElement('div');
      wrapper.className = 'hook-event ' + (event.status || '');
      const status = event.status === 'pass' ? '✓ PASS' :
                     event.status === 'block' ? '✗ BLOCK' :
                     event.status === 'skip' ? '○ skip' : '';
      wrapper.innerHTML = `<span class="hook-label">${escapeHtml(event.name)}</span><span style="color:var(--text-faint)">[${status}]</span> `;
      const txt = document.createElement('span');
      wrapper.appendChild(txt);
      terminal.appendChild(wrapper);
      await typeText(txt, event.text, 3);
      break;
    }
    case 'sep': {
      const sep = document.createElement('div');
      sep.className = 'phase-sep';
      sep.textContent = '— ' + event.text + ' —';
      terminal.appendChild(sep);
      await sleep(150);
      break;
    }
  }
  scrollToBottom();
}

async function play() {
  if (isPlaying) return;
  isPlaying = true;
  abortController = new AbortController();
  playBtn.disabled = true;
  pauseBtn.disabled = false;
  try {
    while (currentStep < SCENARIOS[currentScenario].length) {
      const ev = SCENARIOS[currentScenario][currentStep];
      await playEvent(ev);
      currentStep++;
      updateProgress();
      await sleep(300);
    }
  } catch (e) {
    // aborted
  }
  isPlaying = false;
  playBtn.disabled = false;
  pauseBtn.disabled = true;
}

function pause() {
  if (!isPlaying) return;
  abortController?.abort();
}

function restart() {
  pause();
  terminal.innerHTML = '';
  currentStep = 0;
  updateProgress();
}

function skip() {
  pause();
  setTimeout(() => {
    // Render all remaining events instantly
    abortController = new AbortController();
    const originalSpeed = speedMultiplier;
    speedMultiplier = 1000;
    (async () => {
      while (currentStep < SCENARIOS[currentScenario].length) {
        const ev = SCENARIOS[currentScenario][currentStep];
        await playEvent(ev);
        currentStep++;
        updateProgress();
      }
      speedMultiplier = originalSpeed;
      scrollToBottom();
    })();
  }, 100);
}

function updateProgress() {
  const total = SCENARIOS[currentScenario].length;
  progressEl.textContent = `step ${currentStep} / ${total}`;
}

function selectScenario(idx) {
  pause();
  setTimeout(() => {
    currentScenario = idx;
    scenarioBtns.forEach((b) => b.classList.toggle('active', parseInt(b.dataset.scenario, 10) === idx));
    restart();
    play();
  }, 100);
}

scenarioBtns.forEach((btn) => {
  btn.addEventListener('click', () => {
    selectScenario(parseInt(btn.dataset.scenario, 10));
  });
});

// The hand-authored data-scenario attributes (0,1,3,2) ARE the SCENARIOS
// indices — the click handler reads them directly. Do NOT overwrite them by
// DOM order: button "3 · Hook blocks" → SCENARIOS[3], "4 · Excluded" →
// SCENARIOS[2]; overwriting swapped those two scenarios.

playBtn.addEventListener('click', () => play());
pauseBtn.addEventListener('click', () => pause());
restartBtn.addEventListener('click', () => { restart(); });
skipBtn.addEventListener('click', () => skip());

// Initial state
pauseBtn.disabled = true;
updateProgress();
// Auto-start scenario 0 after a short beat
setTimeout(() => play(), 500);
</script>
</body>
